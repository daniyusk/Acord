name: Check frontend

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.lock'
      - '**.rs'
    branches:
      - main
  pull_request:
    paths-ignore:
      - '**.lock'
      - '**.rs'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  tsc-eslint-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install modules
        run: pnpm install --frozen-lockfile

      - name: Verify Tauri CLI version
        run: pnpm check:tauri-cli

      - name: Type-check injection sources
        run: pnpm typecheck:injection

      - name: Run esbuild
        run: pnpm build:js

      - name: Run ESLint
        run: pnpm eslint ./src-tauri/injection/**/*.ts

      - name: Validate Tauri security boundaries
        run: pnpm test:security
